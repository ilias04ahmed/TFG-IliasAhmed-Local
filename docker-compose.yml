services:
  web:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - db
    volumes:
      - ./frontend/src:/var/www/html
    env_file:
      - .env.ejemplo

  api:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
    env_file:
      - .env.ejemplo

  db:
    image: postgres:15
    container_name: postgres_gps
    restart: always
    environment:
      POSTGRES_DB: base_datos
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: contraseña
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro